                <button class="theme-btn" onclick="setTheme('light')" data-theme="light">

                        <div class="color-top" style="background: #f1f1f1;"></div>
                        <div class="color-bottom" style="background: #ffffff;"></div>
                    </div>
                    <span>Light</span>
                </button>

                <button class="theme-btn" onclick="setTheme('telurines')" data-theme="telurines">
                    <div class="theme-preview">

                        <div class="color-bottom" style="background: #FAF9C8;"></div>
                    </div>
                    <span>Telurines</span>

                <button class="theme-btn" onclick="setTheme('julia')" data-theme="julia">

                        <div class="color-bottom" style="background: #310843;"></div>

                    <span>Julia</span>
                </button>
            </div>
        </div>

        <div class="settings-section">
            <h3>Font</h3>
            <div class="font-options">
                <button class="font-btn active" onclick="setFont('mono')" data-font="mono">
                    <span style="font-family: monospace;">Mono</span>
                </button>
                <button class="font-btn" onclick="setFont('serif')" data-font="serif">
                    <span style="font-family: Georgia, serif;">Serif</span>
                </button>
                <button class="font-btn" onclick="setFont('readable')" data-font="readable">
                    <span style="font-family: system-ui, sans-serif;">Clean</span>
                </button>
            </div>
        </div>

    </div>
</div>

  <div id="content">Loading...</div>

    <script>
      async function loadMarkdown() {
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('file');
        
        if (!fileName) {
          document.getElementById('content').innerHTML = "Error: Please try selecting a chapter from the list.";
          return;
        }
        
        try {
          const url = `english/${fileName}`;
          
          const response = await fetch(`english/${fileName}`);
          
          if (!response.ok) throw new Error("Not found");
          
          const markdownText = await response.text();
          
          document.getElementById('content').innerHTML = marked.parse(markdownText);
        } catch (error) {
          document.getElementById('content').innerHTML = "Couldn't load: " + error.message;
        }
      }
      loadMarkdown();
    </script>
    <script src="ajustes.js"></script>
